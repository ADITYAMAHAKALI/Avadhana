# Local dev only — see infra/k8s/sarvam-mock/README.md and CLAUDE.md
# "Local Development Environment" section. The ai-coordinator-worker
# resolves this mock via this Service name when SARVAM_USE_MOCK=true:
# sarvam-mock.avadhana-dev.svc.cluster.local:8080
apiVersion: v1
kind: Service
metadata:
  name: sarvam-mock
  namespace: avadhana-dev
  labels:
    app: sarvam-mock
spec:
  type: ClusterIP
  selector:
    app: sarvam-mock
  ports:
    - name: http
      port: 8080
      targetPort: 8080
