# Local dev only — see infra/k8s/redis/README.md and CLAUDE.md
# "Local Development Environment" section. No auth, no persistence, no HA —
# not representative of the production data tier.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: avadhana-dev
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
