[project]
name = "avadhana-ai-coordinator-worker"
version = "0.1.0"
description = "Avadhana AI Coordinator Worker — minimal RQ job-queue skeleton pending real SARVAM AI integration (see issues #19-27)."
requires-python = ">=3.12"
dependencies = [
    "rq>=1.16,<2.0",
    "redis>=5.0,<6.0",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"
