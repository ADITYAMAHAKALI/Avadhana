[alembic]
script_location = migrations

# No hardcoded sqlalchemy.url here — migrations/env.py reads DATABASE_URL
# from the environment instead (see env.py docstring). This keeps the
# same "no hardcoded connection strings" rule the rest of the service
# follows (CLAUDE.md "Security & Solo-Dev Architecture").

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
